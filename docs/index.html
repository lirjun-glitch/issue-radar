<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Issue Radar Archive</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">Issue Radar Archive</p>
      <h1>날짜별 전략 이슈 레이더</h1>
      <p class="lead">웹 이슈와 뉴스레터 신호를 날짜별로 보존하고, 카테고리별 카드와 핵심 내러티브로 다시 읽는 공개 아카이브다.</p>
    </section>
    <section class="toolbar">
      <input id="search" type="search" placeholder="날짜, 키워드, 카테고리 검색" />
      <select id="category"><option value="">전체 카테고리</option><option>국제</option><option>정치</option><option>경제</option><option>산업</option><option>기업</option><option>문화</option><option>사회</option><option>기타</option></select>
    </section>
    <section id="reports" class="grid"></section>
  </main>
  <script src="./assets/app.js"></script>
</body>
</html>
